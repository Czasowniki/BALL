<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CCRT - BALL</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; --ui-color: #000000; }
        body.dark-mode { --bg-color: #121212; --ui-color: #ffffff; }
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background-color: var(--bg-color);
            font-family: sans-serif;
            overflow: hidden;
        }

        model-viewer {
            width: 100%; height: 100%;
            display: block;
        }

        .ui-element {
            position: absolute; z-index: 100;
            background: none; border: none;
            color: var(--ui-color); /* Usunięto difference dla testu */
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Pozycje przycisków */
        .brand-ccrt { top: 32px; left: 32px; }
        .brand-czasowniki { top: 32px; right: 32px; }
        .btn-theme { bottom: 40px; left: 32px; }
        .btn-pause { bottom: 40px; left: 50%; transform: translateX(-50%); }
        .btn-reset { bottom: 40px; right: 32px; }

        svg { width: 24px; height: 24px; fill: currentColor; }

        .info-panel {
            position: absolute; top: 65px; left: 32px;
            display: none; color: var(--ui-color);
        }
        .info-panel.visible { display: block; }
    </style>
</head>
<body>

    <button class="ui-element brand-ccrt" id="toggle-ccrt">BALL</button>
    <div id="panel-ccrt" class="info-panel">
        88x84x86 mm<br>Druk 3D PLA
    </div>

    <button class="ui-element brand-czasowniki" id="toggle-czasowniki">INFO</button>
    <div id="panel-czasowniki" class="info-panel" style="right: 32px; left: auto; text-align: right;">
        Obiekt kinetyczny BALL.
    </div>

    <button class="ui-element btn-theme" id="theme-toggle">THEME</button>

    <button class="ui-element btn-pause" id="pause-toggle">
        <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <button class="ui-element btn-reset" id="reset-view">RESET</button>

    <model-viewer 
        id="clock-model"
        src="BALL.glb" 
        camera-controls
        autoplay
        camera-orbit="0deg 75deg 140%"
        loading="eager">
    </model-viewer>

    <script>
        const mv = document.querySelector('#clock-model');

        // Obsługa paneli
        document.getElementById('toggle-ccrt').onclick = () => document.getElementById('panel-ccrt').classList.toggle('visible');
        document.getElementById('toggle-czasowniki').onclick = () => document.getElementById('panel-czasowniki').classList.toggle('visible');

        // Dark mode
        document.getElementById('theme-toggle').onclick = () => {
            document.body.classList.toggle('dark-mode');
        };

        // Pause/Play
        const pauseBtn = document.getElementById('pause-toggle');
        pauseBtn.onclick = () => {
            if (mv.paused) {
                mv.play();
                document.getElementById('icon-pause').style.display = 'block';
                document.getElementById('icon-play').style.display = 'none';
            } else {
                mv.pause();
                document.getElementById('icon-pause').style.display = 'none';
                document.getElementById('icon-play').style.display = 'block';
            }
        };

        // Reset
        document.getElementById('reset-view').onclick = () => {
            mv.cameraOrbit = "0deg 75deg 140%";
        };
    </script>
</body>
</html>
